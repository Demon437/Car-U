  <!-- =========================================
       LOADER STYLES
  ========================================== -->
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
    }

    /* Hide app initially */
    #root {
      display: none;
    }

    /* Full-screen loader */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #111827, #991b1b, #111827);
      color: #ffffff;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Spinner */
    .chakra {
      width: 90px;
      height: 90px;
      border: 6px solid rgba(255, 255, 255, 0.15);
      border-top-color: #ffffff;
      border-right-color: #ef4444;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.35);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Title */
    .title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      text-align: center;
    }

    .title span {
      color: #ef4444;
    }

    /* Subtitle */
    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      text-align: center;
    }

    @media (max-width: 640px) {
      .chakra {
        width: 72px;
        height: 72px;
      }

      .title {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.65rem;
        letter-spacing: 0.2em;
      }
    }
  </style>
</head>

<body>
  <!-- =========================================
       LOADING SCREEN
  ========================================== -->
  <div id="loader">
    <div class="chakra"></div>
    <div class="title">LOADING <span>CAR</span></div>
    <div class="subtitle">Blessings in Progress</div>
  </div>

  <!-- =========================================
       REACT ROOT
  ========================================== -->
  <div id="root"></div>

  <!-- =========================================
       MAIN APP
  ========================================== -->
  <script type="module" src="/src/main.tsx"></script>

  <!-- =========================================
       LOADER SCRIPT
  ========================================== -->
  <script>
    window.addEventListener("load", function () {
      const loader = document.getElementById("loader");
      const root = document.getElementById("root");

      // Keep loader visible for at least 1.2 seconds
      setTimeout(() => {
        if (loader) loader.classList.add("hidden");
        if (root) root.style.display = "block";

        // Remove loader from DOM after fade-out
        setTimeout(() => {
          if (loader) loader.remove();
        }, 400);
      }, 1200);
    });
  </script>
</body>

</html>
